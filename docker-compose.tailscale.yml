services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flighttrackr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    container_name: api
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/flighttrackr
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/flighttrackr
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DEBUG: "true"
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    network_mode: service:tailscale # Connects API container to Tailscale network for direct access without port mapping
    depends_on:
      tailscale:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- TAILSCALE FUNNEL ADDITION ---
  tailscale:
    image: tailscale/tailscale:latest
    hostname: flighttrackr-api
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_SERVE_CONFIG=/config/funnel.json
    volumes:
      - tailscale_data:/var/lib/tailscale
      - ./.tailscale/funnel.json:/config/funnel.json
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  celery:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/flighttrackr
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/flighttrackr
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: uv run celery -A app.tasks.celery_app worker --loglevel=info --pool=prefork
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  tailscale_data: # Persists Tailscale ID so it doesn't create a new node on every restart