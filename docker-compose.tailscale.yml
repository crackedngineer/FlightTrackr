services:
  # --- TAILSCALE FUNNEL ADDITION ---
  # Note :- Inside container run `tailscale funnel enable` to enable the funnel and expose the API to the internet via Tailscale.
  tailscale:
    image: tailscale/tailscale:latest
    hostname: flighttrackr-api
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_SERVE_CONFIG=/config/funnel.json
    volumes:
      - tailscale_data:/var/lib/tailscale
      - ./.tailscale/funnel.json:/config/funnel.json
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tailscale", "status", "--json"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  traefik:
    image: traefik:latest
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=boarding-pass-parser_app"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
      - "--accesslog=true"
    container_name: traefik
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      tailscale:
        condition: service_healthy
    network_mode: service:tailscale
    restart: unless-stopped

  api:
    container_name: api
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=boarding-pass-parser_app"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.priority=100"
      - "traefik.http.services.api.loadbalancer.server.port=8001"
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - ./api.env
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DATABASE_USERNAME}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/flighttrackr
      SYNC_DATABASE_URL: postgresql+psycopg2://[${DATABASE_USERNAME}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/flighttrackr
      REDIS_URL: redis://${REDIS_USERNAME}:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/0
      CELERY_BROKER_URL: redis://${REDIS_USERNAME}:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/0
      CELERY_RESULT_BACKEND: redis://${REDIS_USERNAME}:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/1
      DEBUG: "true"
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips="*"
    depends_on:
      tailscale:
        condition: service_healthy
    restart: unless-stopped

  web:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=boarding-pass-parser_app"
      - "traefik.http.routers.web.rule=PathPrefix(`/`)"
      - "traefik.http.routers.web.entrypoints=web"
      - "traefik.http.routers.web.priority=1"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: web
    ports:
      - "3000:3000"
    env_file:
      - ./web.env
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://flighttrackr-api.tailcda03.ts.net/api/v1
      NEXT_PUBLIC_API_URL: https://flighttrackr-api.tailcda03.ts.net/api/v1
    depends_on:
      - api
    restart: unless-stopped

  celery:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - ./api.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DATABASE_USERNAME}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/flighttrackr
      SYNC_DATABASE_URL: postgresql+psycopg2://[${DATABASE_USERNAME}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/flighttrackr
      REDIS_URL: redis://${REDIS_USERNAME}:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/0
      CELERY_BROKER_URL: redis://${REDIS_USERNAME}:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/0
      CELERY_RESULT_BACKEND: redis://${REDIS_USERNAME}:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/1
    command: uv run celery -A app.tasks.celery_app worker --loglevel=info --pool=prefork

volumes:
  postgres_data:
  tailscale_data: # Persists Tailscale ID so it doesn't create a new node on every restart
